databases:
  - name: mediclinic-db
    databaseName: mediclinic
    user: mediclinic
    plan: free

services:
  - type: web
    name: mediclinic-backend
    runtime: python
    plan: free
    buildCommand: pip install -r MediClinic-official-backend/requirements.txt
    startCommand: cd MediClinic-official-backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediclinic-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PYO3_USE_ABI3_FORWARD_COMPATIBILITY
        value: "1"

  - type: web
    name: mediclinic-frontend
    env: static
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
