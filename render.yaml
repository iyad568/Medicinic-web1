databases:
  - name: mediclinic-db
    databaseName: mediclinic
    user: mediclinic
    plan: free

services:
  - type: web
    name: mediclinic-backend
    runtime: python
    plan: free
    rootDir: MediClinic-official-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediclinic-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: mediclinic-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
