databases:
  - name: mediclinic-db
    databaseName: mediclinic
    user: mediclinic
    plan: free

services:
  - type: web
    name: mediclinic-backend
    runtime: python
    plan: free
    buildCommand: pip install -r MediClinic-official-backend/requirements.txt
    startCommand: cd MediClinic-official-backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediclinic-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: mediclinic-frontend
    env: static
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
